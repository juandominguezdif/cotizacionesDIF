<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DIF - Cotizaciones</title>
  <style>
    :root {
      --dif-blue: #005baa;
      --dif-blue-2: #1468ad;
      --dif-orange: #f7941d;
      --line: #cfcfcf;
      --label-bg: #f0f2f5;
      --page-w: 816px;
      --page-h: 1056px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #202020;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .toolbar {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.22);
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: 1fr 260px 180px;
      gap: 14px;
      align-items: start;
    }

    .toolbar-title {
      font-weight: 700;
      color: var(--dif-blue);
      margin: 0 0 8px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .2px;
    }

    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fcl-container-box {
      display: none;
      margin-top: 12px;
    }

    .fcl-container-box.visible { display: block; }

    .fcl-container-box select {
      width: 190px;
      border: 1px solid var(--dif-blue);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--dif-blue);
      font-weight: 700;
      background: #fff;
      font-size: 13px;
    }

    .segmented button,
    .action-button {
      border: 1px solid var(--dif-blue);
      background: #fff;
      color: var(--dif-blue);
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .segmented button.active,
    .action-button.primary {
      background: var(--dif-blue);
      color: #fff;
    }

    .language-box label,
    .comment-options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
      color: #333;
      font-size: 13px;
      cursor: pointer;
    }

    .comments-panel {
      background: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
    }

    .comments-panel textarea {
      width: 100%;
      min-height: 72px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      padding: 8px 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }

    .comment-options {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-text {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    .quote-page {
      width: var(--page-w);
      height: var(--page-h);
      background: #fff;
      margin: 0 auto 18px auto;
      padding: 18px 24px 14px 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.12), 0 8px 24px rgba(0,0,0,.32);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .page-main {
      display: block;
      flex: 0 0 auto;
    }

    .logo {
      width: 92px;
      height: auto;
      display: block;
      margin: 0 0 10px 2px;
      background: transparent;
    }

    .quote-title {
      text-align: center;
      color: var(--dif-blue);
      font-size: 21px;
      font-weight: 700;
      margin: 6px 0 28px 0;
      line-height: 1;
    }

    .orange-line {
      border-top: 2px solid var(--dif-orange);
      margin: 0 0 12px 0;
    }

    table { border-collapse: collapse; width: 100%; }

    .date-table {
      table-layout: fixed;
    }

    .date-table th {
      width: 50%;
      background: var(--dif-blue-2);
      color: #fff;
      font-size: 16px;
      line-height: 1;
      height: 20px;
      padding: 3px 8px;
      text-align: center !important;
      font-weight: 700;
      vertical-align: middle;
    }

    .date-table td {
      width: 50%;
      height: 24px;
      text-align: center !important;
      font-size: 14px;
      padding: 4px 8px 6px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    .party-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 34px;
      margin-top: 16px;
    }

    .party-table td {
      vertical-align: middle;
      height: 34px;
      font-size: 13px;
      padding: 5px 7px;
    }

    .party-table .label {
      width: 165px;
      background: var(--label-bg);
      color: var(--dif-blue);
      font-weight: 700;
      font-size: 14px;
    }

    .details-title {
      margin-top: 14px;
      background: var(--dif-blue-2);
      color: #fff;
      text-align: center;
      height: 20px;
      line-height: 20px;
      font-weight: 700;
      font-size: 16px;
    }

    .details-table td {
      border: 1px solid var(--line);
      height: 29px;
      font-size: 12.5px;
      padding: 4px 7px;
      vertical-align: middle;
    }

    .details-table .label {
      width: 135px;
      background: var(--label-bg);
      color: var(--dif-blue);
      font-weight: 700;
      font-size: 14px;
    }

    .details-table .value { width: 240px; }

    .charges-table {
      margin-top: 22px;
      color: var(--dif-blue);
      table-layout: fixed;
    }

    .charges-table thead th {
      background: var(--dif-blue-2);
      color: #fff;
      height: 30px;
      padding: 5px 5px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .charges-table thead th:first-child { text-align: left; }

    .charges-table td {
      height: 24px;
      padding: 4px 5px;
      font-size: 12px;
      vertical-align: middle;
      text-align: right;
      line-height: 1.1;
    }

    .charges-table td:first-child { text-align: left; }

    .charges-table .section td {
      height: 26px;
      padding-top: 7px;
      color: var(--dif-blue);
      font-size: 17px;
      line-height: 1;
      text-align: left;
      font-weight: 700;
      border-bottom: 2px solid var(--dif-blue);
    }

    .charges-table .total-value { font-weight: 700; }

    .charges-table.continuation {
      margin-top: 34px;
    }

    .charges-table.continuation td {
      font-size: 14px;
      height: 30px;
    }

    .charges-table.continuation .section td {
      font-size: 18px;
      height: 32px;
    }


    .charges-zone {
      display: block;
    }

    .after-charges {
      display: block;
    }

    .page-continuation .logo,
    .page-terms .logo {
      margin-bottom: 34px;
    }

    .total-line {
      margin-top: 44px;
      border-top: 2px solid var(--dif-blue);
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      color: var(--dif-blue);
      font-size: 16px;
      font-weight: 700;
      padding: 10px 8px 0 8px;
      min-height: 34px;
    }

    .total-line .amount { text-align: right; }

    .total-line.multi {
      grid-template-columns: 1.65fr 1fr 1fr 1fr;
      column-gap: 8px;
    }

    .terms-title {
      margin-top: 34px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      background: var(--dif-blue-2);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .terms-block {
      color: var(--dif-blue);
      font-size: 12px;
      line-height: 1.06;
      padding: 10px 6px 0 6px;
    }

    .terms-subtitle {
      font-weight: 700;
      margin: 6px 0 7px 0;
      font-size: 13px;
      color: var(--dif-blue);
    }

    .terms-line {
      margin: 0 0 1px 0;
      color: var(--dif-blue);
      font-size: 12px;
      line-height: 1.06;
    }

    .terms-text { white-space: pre-line; }

    .footer {
      border-top: 2px solid var(--dif-blue);
      color: #536271;
      text-align: center;
      font-size: 9.5px;
      line-height: 1.5;
      padding-top: 4px;
      margin-top: auto;
    }


    .internal-comment-print {
      display: none;
      color: var(--dif-blue);
      border: 1px solid var(--dif-blue);
      margin-top: 18px;
      padding: 8px 10px;
      font-size: 12px;
      white-space: pre-line;
    }

    .internal-comment-print strong {
      display: block;
      margin-bottom: 5px;
    }

    .show-comment .internal-comment-print {
      display: block;
    }

    .hidden { display: none; }

    @media (max-width: 880px) {
      .app-shell { padding-left: 8px; padding-right: 8px; }
      .toolbar-grid { grid-template-columns: 1fr; }
      .quote-page {
        transform-origin: top center;
      }
    }

    @media print {
      body { background: #fff; }
      .app-shell { padding: 0; max-width: none; }
      .toolbar, .comments-panel { display: none !important; }
      .quote-page {
        width: 8.5in;
        min-height: 11in;
        height: 11in;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }
      .quote-page:last-child { page-break-after: auto; break-after: auto; }
      @page { size: Letter; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="toolbar">
      <div class="toolbar-grid">
        <div>
          <p class="toolbar-title">Tipo de cotización</p>
          <div class="segmented" id="typeButtons">
            <button data-type="FCL">FCL</button>
            <button data-type="LCL">LCL</button>
            <button data-type="AEREO">Aéreo</button>
          </div>
          <div class="fcl-container-box" id="fclContainerBox">
            <p class="toolbar-title" style="margin-top:12px;">Contenedores FCL visibles</p>
            <select id="fclContainerCount" aria-label="Cantidad de columnas de contenedores FCL">
              <option value="1">1 contenedor: 20FT</option>
              <option value="2">2 contenedores: 20FT + 40FT</option>
              <option value="3" selected>3 contenedores: 20FT + 40FT + 40FT HC</option>
            </select>
          </div>
        </div>
        <div class="language-box">
          <p class="toolbar-title">Idioma</p>
          <label><input type="radio" name="lang" value="ES" checked> Español</label>
          <label><input type="radio" name="lang" value="EN"> English</label>
        </div>
        <div>
          <p class="toolbar-title">Acciones</p>
          <button class="action-button primary" id="printBtn">Imprimir / PDF</button>
          <button class="action-button" id="copyBtn" style="margin-top:8px;">Copiar HTML</button>
        </div>
      </div>
    </section>

    <section class="comments-panel">
      <p class="toolbar-title">Comentario interno de control</p>
      <textarea id="internalComment" placeholder="Escribe aquí un comentario para esta cotización, tipo e idioma. Se guarda en SharePoint mediante Power Automate."></textarea>
      <div class="comment-options">
        <button class="action-button primary" id="saveCommentBtn" type="button">Guardar comentario</button>
        <label><input type="checkbox" id="showCommentInQuote"> Mostrar comentario dentro de la cotización</label>
      </div>
      <div class="status-text" id="commentStatus">Pendiente de sincronizar con Power Automate.</div>
    </section>

    <main id="quoteRoot"></main>
  </div>

            cont.className = 'terms-subtitle';
            cont.textContent = section.title;
            block.appendChild(cont);

            block.appendChild(line);
          }
        }
      }

      const comment = localStorage.getItem(commentKey()) || '';
      if (comment && localStorage.getItem(showCommentKey()) === '1') {
        const commentNode = document.createElement('div');
        commentNode.className = 'internal-comment-print';
        commentNode.innerHTML = `<strong>${escapeHtml(q.labels.internalComment)}</strong>${nl(comment)}`;
        state = appendNodeWithPageBreak(state, commentNode, q);
      }
    }

    function beautifyHtml(source) {
      const voidTags = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
      const normalized = String(source || '')
        .replace(/>\s+</g, '><')
        .replace(/</g, '\n<')
        .split('\n')
        .map(x => x.trim())
        .filter(Boolean);

      let indent = 0;
      const lines = [];

      for (const token of normalized) {
        const closing = /^<\//.test(token);
        const comment = /^<!--/.test(token);
        const tagMatch = token.match(/^<\/?\s*([a-zA-Z0-9:-]+)/);
        const tag = tagMatch ? tagMatch[1].toLowerCase() : '';
        const selfClosing = /\/?>$/.test(token) && (token.endsWith('/>') || voidTags.has(tag));
        const singleLine = /^<[^>]+>.*<\/[^>]+>$/.test(token);

        if (closing) indent = Math.max(indent - 1, 0);
        lines.push(`${'  '.repeat(indent)}${token}`);

        if (!closing && !selfClosing && !singleLine && !comment && tag && !/^<!/.test(token)) {
          indent += 1;
        }
      }

      return lines.join('\n');
    }

    function buildPowerAutomateEmailHtml() {
      const html = `<style>
${getPowerAutomateCss().trim()}
</style>
<div class="${escapeHtml(root.className || '')}">
${root.innerHTML}
</div>`;
      return beautifyHtml(html);
    }


    function getCurrentQuoteNumber() {
      const q = quoteData[currentType][currentLang];
      const match = String(q.title || '').match(/COT-\d+/i);
      return match ? match[0].toUpperCase() : String(q.title || '').trim();
    }

    function getCurrentCommentIdentity() {
      return `${getCurrentQuoteNumber()}|${currentType}|${currentLang}`;
    }

    async function callCommentsApi(payload) {
      const response = await fetch(POWER_AUTOMATE_COMMENTS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch (err) {
        throw new Error('Power Automate devolvió una respuesta no JSON: ' + text);
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.message || 'Power Automate no pudo procesar la solicitud.');
      }

      return data;
    }

    async function loadCommentFromPowerAutomate() {
      const requestVersion = ++commentRequestVersion;
      const identity = getCurrentCommentIdentity();

      statusText.textContent = `Cargando comentario ${identity}...`;
      commentBox.disabled = true;
      saveCommentBtn.disabled = true;

      try {
        const data = await callCommentsApi({
          accion: 'get',
          numeroCotizacion: getCurrentQuoteNumber(),
          tipoCotizacion: currentType,
          idioma: currentLang,
          token: COMMENTS_TOKEN
        });

        if (requestVersion !== commentRequestVersion || identity !== getCurrentCommentIdentity()) return;

        currentComment = data.comentario || '';
        commentBox.value = currentComment;
        renderQuote();

        const metadata = data.actualizadoPor
          ? ` Última actualización: ${data.actualizadoPor}${data.fechaActualizacion ? ' - ' + data.fechaActualizacion : ''}.`
          : '';

        statusText.textContent = `Comentario sincronizado desde SharePoint.${metadata}`;
      } catch (err) {
        if (requestVersion !== commentRequestVersion) return;
        console.error(err);
        statusText.textContent = 'No se pudo cargar el comentario desde Power Automate. Revisa el flujo o la conexión.';
      } finally {
        if (requestVersion === commentRequestVersion) {
          commentBox.disabled = false;
          saveCommentBtn.disabled = false;
        }
      }
    }

    async function saveCommentToPowerAutomate() {
      const identity = getCurrentCommentIdentity();
      currentComment = commentBox.value;

      statusText.textContent = `Guardando comentario ${identity}...`;
      saveCommentBtn.disabled = true;
      commentBox.disabled = true;

      try {
        const data = await callCommentsApi({
          accion: 'save',
          numeroCotizacion: getCurrentQuoteNumber(),
          tipoCotizacion: currentType,
          idioma: currentLang,
          comentario: currentComment,
          usuario: 'IT Team',
          token: COMMENTS_TOKEN
        });

        statusText.textContent = data.message || 'Comentario guardado correctamente en SharePoint.';
        renderQuote();
      } catch (err) {
        console.error(err);
        statusText.textContent = 'No se pudo guardar el comentario. Revisa Power Automate o SharePoint.';
      } finally {
        saveCommentBtn.disabled = false;
        commentBox.disabled = false;
        commentBox.focus();
      }
    }

    function renderQuote() {
      const q = quoteData[currentType][currentLang];
      const commentVisible = localStorage.getItem(showCommentKey()) === '1';
      root.className = commentVisible ? 'show-comment' : '';
      root.innerHTML = '';

      let state = createChargePage(q, true);
      root.appendChild(state.page);

      const rows = getAllChargeRows(q);

      for (const row of rows) {
        appendChargeRow(state, q, row);

        if (pageOverflows(state.page)) {
          removeLastRow(state);

          let carrySection = null;
          if (!row.section) {
            carrySection = moveTrailingSectionIfNeeded(state);
          }

          state = createChargePage(q, false);
          root.appendChild(state.page);

          if (carrySection) appendChargeRow(state, q, carrySection);
          appendChargeRow(state, q, row);

          if (pageOverflows(state.page)) {
            console.warn('Una fila individual excede el espacio disponible de la página:', row);
          }
        }
      }

      appendTermsPaginated(state, q);

      document.querySelectorAll('#typeButtons button').forEach(btn => btn.classList.toggle('active', btn.dataset.type === currentType));
      document.querySelectorAll('input[name="lang"]').forEach(r => r.checked = r.value === currentLang);
      fclContainerBox.classList.toggle('visible', currentType === 'FCL');
      fclContainerSelect.value = String(fclContainerCount);
      commentBox.value = currentComment;
      showComment.checked = commentVisible;
    }

    document.getElementById('typeButtons').addEventListener('click', e => {
      const btn = e.target.closest('button[data-type]');
      if (!btn) return;
      currentType = btn.dataset.type;
      currentComment = '';
      renderQuote();
      loadCommentFromPowerAutomate();
    });

    fclContainerSelect.addEventListener('change', e => {
      fclContainerCount = Number(e.target.value) || 3;
      renderQuote();
    });

    document.querySelectorAll('input[name="lang"]').forEach(radio => {
      radio.addEventListener('change', e => {
        currentLang = e.target.value;
        currentComment = '';
        renderQuote();
        loadCommentFromPowerAutomate();
      });
    });

    commentBox.addEventListener('input', () => {
      currentComment = commentBox.value;
      renderQuote();
      commentBox.focus();
      commentBox.selectionStart = commentBox.selectionEnd = commentBox.value.length;
      statusText.textContent = 'Comentario modificado localmente. Presiona Guardar comentario para sincronizarlo.';
    });

    saveCommentBtn.addEventListener('click', () => {
      saveCommentToPowerAutomate();
    });

    showComment.addEventListener('change', () => {
      localStorage.setItem(showCommentKey(), showComment.checked ? '1' : '0');
      renderQuote();
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const html = buildPowerAutomateEmailHtml();
      try {
        await navigator.clipboard.writeText(html);
        statusText.textContent = 'HTML embellecido listo para Send Email V2 copiado al portapapeles.';
      } catch (err) {
        statusText.textContent = 'No se pudo copiar automáticamente. Selecciona manualmente el HTML desde el inspector.';
      }
    });

    renderQuote();
    loadCommentFromPowerAutomate();
  </script>
